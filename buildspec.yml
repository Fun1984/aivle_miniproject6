version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
      java: corretto17
    commands:
      - echo "=== Installing frontend dependencies ==="
      - npm install --prefix frontend

  pre_build:
    commands:
      - echo "=== Pre-build checks ==="
      - node --version
      - npm --version
      - java -version
      - echo "Build started at $(date)"

  build:
    commands:
      # ── Frontend (React/Vite) ──────────────────────────────
      - echo "=== Building React/Vite app ==="
      - npm run build --prefix frontend

      # ── Backend (Spring Boot / Gradle) ────────────────────
      - echo "=== Building Spring Boot app ==="
      - cd backend && chmod +x gradlew && ./gradlew bootJar -x test && cd ..

  post_build:
    commands:
      - echo "=== Build completed at $(date) ==="
      - echo "=== Artifact summary ==="
      - ls frontend/dist/
      - ls backend/build/libs/

artifacts:
  files:
    # Frontend 정적 파일
    - frontend/dist/**/*
    # Backend 실행 JAR
    - backend/build/libs/*.jar
    # CodeDeploy 설정 (레포에 존재할 경우에만 포함됨)
    - appspec.yml
    - scripts/**/*
  discard-paths: no

cache:
  paths:
    - frontend/node_modules/**/*
    - /root/.gradle/caches/**/*
