version: 0.2

env:
  variables:
    AWS_REGION: ap-northeast-2
    ECR_URI: <AWSNUM>.dkr.ecr.ap-northeast-2.amazonaws.com
    ACCOUNT: <your-account-prefix>
    EKS_CLUSTER: <ACCOUNT>-cluster
    NAMESPACE: bookapp

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - aws ecr get-login-password --region $AWS_REGION |
          docker login --username AWS --password-stdin $ECR_URI

  pre_build:
    commands:
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - FRONTEND_URI=$ECR_URI/$ACCOUNT-frontend:$IMAGE_TAG
      - BACKEND_URI=$ECR_URI/$ACCOUNT-backend:$IMAGE_TAG

  build:
    commands:
      # Frontend 이미지 빌드
      - docker build -t $FRONTEND_URI ./frontend
      # Backend 이미지 빌드
      - docker build -t $BACKEND_URI ./backend

  post_build:
    commands:
      # ECR Push
      - docker push $FRONTEND_URI
      - docker push $BACKEND_URI
      # EKS 배포
      - aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
      - kubectl set image deployment/frontend-deploy
          frontend=$FRONTEND_URI -n $NAMESPACE
      - kubectl set image deployment/backend-deploy
          backend=$BACKEND_URI -n $NAMESPACE
      - kubectl rollout status deployment/frontend-deploy -n $NAMESPACE
      - kubectl rollout status deployment/backend-deploy -n $NAMESPACE