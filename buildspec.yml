version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - aws ecr get-login-password --region $AWS_REGION |
          docker login --username AWS --password-stdin $ECR_URI

  pre_build:
    commands:
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - FRONTEND_URI=$ECR_URI/$ACCOUNT-frontend:$IMAGE_TAG
      - BACKEND_URI=$ECR_URI/$ACCOUNT-backend:$IMAGE_TAG

  build:
    commands:
      - docker build -t $FRONTEND_URI ./frontend
      - docker build -t $BACKEND_URI ./backend

  post_build:
    commands:
      - docker push $FRONTEND_URI
      - docker push $BACKEND_URI
      # 매니페스트에 실제 이미지 태그 주입
      - sed -i "s|IMAGE_TAG_PLACEHOLDER|$IMAGE_TAG|g" k8s/frontend-deployment.yaml
      - sed -i "s|IMAGE_TAG_PLACEHOLDER|$IMAGE_TAG|g" k8s/backend-deployment.yaml

artifacts:
  files:
    - k8s/**/*   # Deploy 스테이지가 이 파일을 받아서 kubectl apply