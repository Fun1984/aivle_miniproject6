version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Installing dependencies ==="
      - npm ci

  pre_build:
    commands:
      - echo "=== Pre-build checks ==="
      - node --version
      - npm --version
      - echo "Build started at $(date)"

  build:
    commands:
      - echo "=== Building React/Vite app ==="
      - npm run build

  post_build:
    commands:
      - echo "=== Build completed at $(date) ==="
      - echo "=== Preparing deployment artifacts ==="
      - cp appspec.yml dist/
      - cp -r scripts/ dist/

artifacts:
  files:
    - "**/*"
  base-directory: dist
  discard-paths: no

cache:
  paths:
    - node_modules/**/*