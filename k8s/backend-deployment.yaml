# k8s/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  namespace: myapp
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 416225317325.dkr.ecr.us-east-1.amazonaws.com/user08-ap-backend:IMAGE_TAG_PLACEHOLDER
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: h2-data
          mountPath: /data
      volumes:
      - name: h2-data
        persistentVolumeClaim:
          claimName: ebs-pvc